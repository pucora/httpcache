name: Go Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Test
      uses: docker://pucora/builder:latest-linux-generic
      with:
        args: sh -c "go get -t -v ./...;
         gofmt -w -s . && git diff --exit-code;
         go vet .;
         go test -v -race ./..."
